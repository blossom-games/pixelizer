<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header id="header">
    <div class="header-left">
      <span class="logo">PIXEL STUDIO</span>
    </div>
    <div class="header-center">
      <div class="mode-switch" id="modeSwitch">
        <button class="mode-btn active" data-mode="draw">Draw</button>
        <button class="mode-btn" data-mode="pixelize">Pixelize</button>
      </div>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="fullscreenBtn" title="Fullscreen (F)">⛶</button>
    </div>
  </header>

  <main id="main">
    <aside id="sidebar">
      <div class="sidebar-section" id="drawTools">
        <div class="tool-group">
          <button class="tool-btn active" data-tool="pencil" title="Pencil (B)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>
          <button class="tool-btn" data-tool="fill" title="Fill (G)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="10" x2="20" y2="10"/></svg></button>
          <button class="tool-btn" data-tool="eraser" title="Eraser (E)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7l-5-5 9-9 9 9-5 5Z"/><line x1="18" y1="6" x2="12" y2="12"/></svg></button>
          <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m2 22 1-1h3l9-9"/><path d="M3 21 9 11"/><path d="m15 7 2-2a2.83 2.83 0 1 1 4 4l-2 2"/></svg></button>
        </div>
        <div class="tool-divider"></div>
        <div class="tool-group">
          <button class="tool-btn" data-tool="symmetry-v" title="Symmetry V (Shift+V)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><path d="M5 4h14v4l-7 7-7-7V4z"/></svg></button>
          <button class="tool-btn" data-tool="symmetry-h" title="Symmetry H (Shift+H)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="12" x2="22" y2="12"/><path d="M4 5h4l7 7-7 7H4V5z"/></svg></button>
          <button class="tool-btn" data-tool="mirror" title="Mirror (M)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><path d="M20 12H12"/><circle cx="16" cy="12" r="4"/></svg></button>
        </div>
        <div class="tool-divider"></div>
        <div class="tool-group">
          <button class="tool-btn" id="undoBtn" title="Undo (Z)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg></button>
          <button class="tool-btn" id="redoBtn" title="Redo (Shift+Z)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/></svg></button>
        </div>
      </div>
      <div class="sidebar-section hidden" id="pixelizeTools">
        <div class="tool-group" style="flex-direction:column;gap:4px;">
          <input type="file" id="imageUpload" accept="image/*" hidden>
          <button class="tool-btn action-btn" id="uploadBtn" title="Upload Image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
          <button class="tool-btn action-btn" id="exportPixelizeBtn" title="Export PNG"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
        </div>
      </div>
    </aside>

    <section id="canvasArea">
      <div id="canvasViewport">
        <canvas id="pixelCanvas"></canvas>
      </div>
      <div id="drawControls" class="canvas-footer">
        <div class="canvas-info">
          <span id="sizeDisplay">32 x 32</span>
          <span class="info-dot">·</span>
          <span id="toolDisplay">Pencil</span>
          <span class="info-dot">·</span>
          <span id="zoomDisplay">800%</span>
        </div>
        <div class="canvas-actions">
          <button id="gridToggle" class="mini-btn active">Grid</button>
          <button id="clearCanvas" class="mini-btn">Clear</button>
        </div>
      </div>
      <div id="pixelizeControls" class="canvas-footer hidden">
        <div class="control-group"><label>Block</label><input type="range" id="blockSize" min="2" max="32" value="8"><span id="blockSizeDisplay">8</span></div>
        <div class="control-group"><label>Colors</label><input type="range" id="paletteColors" min="2" max="64" value="16"><span id="paletteDisplay">16</span></div>
        <div class="control-group checkbox-group"><label><input type="checkbox" id="ditherToggle"> Dither</label></div>
        <button id="applyPixelize" class="mini-btn primary">Apply</button>
      </div>
    </section>

    <aside id="rightBar">
      <div class="sidebar-section">
        <div class="section-label">Color</div>
        <div id="palette"></div>
        <div class="color-input-row">
          <input type="color" id="customColor" value="#ffffff">
          <input type="text" id="colorHex" value="#ffffff" maxlength="7">
        </div>
      </div>
      <div class="tool-divider"></div>
      <div class="sidebar-section" id="canvasSizeSection">
        <div class="section-label">Canvas</div>
        <div class="size-inputs">
          <div><label class="mini-label">W</label><input type="number" id="canvasW" class="size-input" value="32" min="8" max="256"></div>
          <span class="size-sep">x</span>
          <div><label class="mini-label">H</label><input type="number" id="canvasH" class="size-input" value="32" min="8" max="256"></div>
        </div>
        <button id="resizeCanvas" class="mini-btn primary" style="width:100%;margin-top:4px;">Resize</button>
      </div>
      <div class="tool-divider"></div>
      <div class="sidebar-section">
        <div class="section-label">Zoom</div>
        <div class="zoom-control">
          <button id="zoomOut" class="mini-btn">-</button>
          <input type="range" id="zoomSlider" min="100" max="3200" value="800" step="100">
          <button id="zoomIn" class="mini-btn">+</button>
        </div>
      </div>
    </aside>
  </main>

  <div id="toastContainer"></div>
  <script src="js/canvas-engine.js"></script>
  <script src="js/tools.js"></script>
  <script src="js/pixelizer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
